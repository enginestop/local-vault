services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: localvault
      POSTGRES_USER: localvault
      POSTGRES_PASSWORD: localvault
    volumes:
      - localvault-db:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d localvault -U localvault"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    environment:
      LOCALVAULT_DATA_DIR: /app/data
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8741:8741"
    volumes:
      - localvault-data:/app/data
volumes:
  localvault-db:
  localvault-data:
